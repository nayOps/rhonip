# Monitoring FGP — profil: monitoring
# Chemins relatifs à register/ (project_directory).

services:
  prometheus:
    profiles: [monitoring]
    image: prom/prometheus:latest
    container_name: fgp_prometheus
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - onip_prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.console.libraries=/etc/prometheus/console_libraries"
      - "--web.console.templates=/etc/prometheus/consoles"
      - "--storage.tsdb.retention.time=200h"
      - "--web.enable-lifecycle"
    networks:
      - onip_network
    restart: unless-stopped

  grafana:
    profiles: [monitoring]
    image: grafana/grafana:latest
    container_name: fgp_grafana
    ports:
      - "${GRAFANA_PORT:-3001}:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin123}
    volumes:
      - onip_grafana_data:/var/lib/grafana
      - ./docker/grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      - prometheus
    networks:
      - onip_network
    restart: unless-stopped

volumes:
  onip_prometheus_data:
    driver: local
  onip_grafana_data:
    driver: local
