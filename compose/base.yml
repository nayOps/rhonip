# Infrastructure partagée ONIP — base de données et cache uniques pour register + rh.
# Chemins relatifs à ce fichier (compose/).

x-onip-db-env: &onip-db-env
  DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@onip_postgres:5432/${POSTGRES_DB}
  DB_HOST: onip_postgres
  DB_PORT: "5432"
  DB_NAME: ${POSTGRES_DB}
  DB_USER: ${POSTGRES_USER}
  DB_PASSWORD: ${POSTGRES_PASSWORD}

x-onip-redis-env: &onip-redis-env
  REDIS_HOST: onip_redis
  REDIS_PORT: "6379"
  REDIS_PASSWORD: ${REDIS_PASSWORD}

services:
  onip_postgres:
    image: postgres:15-alpine
    container_name: onip_postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --lc-collate=C --lc-ctype=C"
    volumes:
      - onip_postgres_data:/var/lib/postgresql/data
      - ../register/database/unified_schema.sql:/docker-entrypoint-initdb.d/01-unified-biometric.sql
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    networks:
      - onip_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 30s
      timeout: 10s
      retries: 5

  onip_redis:
    image: redis:7-alpine
    container_name: onip_redis
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    volumes:
      - onip_redis_data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    networks:
      - onip_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$$REDIS_PASSWORD\" ping | grep PONG"]
      interval: 30s
      timeout: 10s
      retries: 5

  onip_pgadmin:
    image: dpage/pgadmin4:latest
    container_name: onip_pgadmin
    profiles: [infra]
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@onip.local}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin123}
      PGADMIN_CONFIG_SERVER_MODE: "False"
    ports:
      - "${PGADMIN_PORT:-5050}:80"
    volumes:
      - onip_pgadmin_data:/var/lib/pgadmin
    depends_on:
      onip_postgres:
        condition: service_healthy
    networks:
      - onip_network
    restart: unless-stopped

networks:
  onip_network:
    name: onip_network
    driver: bridge

volumes:
  onip_postgres_data:
    driver: local
  onip_redis_data:
    driver: local
  onip_pgadmin_data:
    driver: local
