# Expose le port 8100 sur l'hôte (tests / tablettes) sans retirer Traefik HTTPS.
# Usage VPS :
#   docker compose -f docker-compose.yml -f compose/prod.yml -f compose/prod.vps.yml -f compose/prod.expose8100.yml --profile rh up -d rh_server

services:
  rh_server:
    ports: !override
      - "${RH_SERVER_PORT:-8100}:8000"
