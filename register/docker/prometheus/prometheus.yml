global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  # - "first_rules.yml"
  # - "second_rules.yml"

scrape_configs:
  # Prometheus lui-même
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # FGP Core Service
  - job_name: 'fgp-core'
    static_configs:
      - targets: ['fgp_core:8000']
    metrics_path: '/metrics'
    scrape_interval: 30s

  # Enrollment Gateway
  - job_name: 'enrollment-gateway'
    static_configs:
      - targets: ['enrollment_gateway:8000']
    metrics_path: '/metrics'
    scrape_interval: 30s

  # Extensions Service
  - job_name: 'extensions-service'
    static_configs:
      - targets: ['extensions_service:8000']
    metrics_path: '/metrics'
    scrape_interval: 30s

  # ABIS Service
  - job_name: 'abis-service'
    static_configs:
      - targets: ['abis_service:8000']
    metrics_path: '/metrics'
    scrape_interval: 30s

  # PostgreSQL
  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres:5432']
    scrape_interval: 30s

  # Redis
  - job_name: 'redis'
    static_configs:
      - targets: ['redis:6379']
    scrape_interval: 30s

  # Node Exporter (si disponible)
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']
    scrape_interval: 30s

  # Nginx
  - job_name: 'nginx'
    static_configs:
      - targets: ['nginx:80']
    metrics_path: '/nginx_status'
    scrape_interval: 30s
