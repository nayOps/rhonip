version: '3.8'

services:
  # =====================================================
  # BASE DE DONNÉES
  # =====================================================
  postgres:
    image: postgres:15-alpine
    container_name: fgp_postgres
    environment:
      POSTGRES_DB: fgp_db
      POSTGRES_USER: fgp_user
      POSTGRES_PASSWORD: fgp_password_2025
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --lc-collate=fr_FR.UTF-8 --lc-ctype=fr_FR.UTF-8"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init:/docker-entrypoint-initdb.d
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    ports:
      - "5433:5432"
    networks:
      - fgp_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fgp_user -d fgp_db"]
      interval: 30s
      timeout: 10s
      retries: 3

  # =====================================================
  # REDIS (Cache et Sessions)
  # =====================================================
  redis:
    image: redis:7-alpine
    container_name: fgp_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - fgp_network
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass fgp_redis_2025

  # =====================================================
  # BACKEND DJANGO - FGP CORE SERVICE
  # =====================================================
  fgp_core:
    build:
      context: ./backend/fgp_core
      dockerfile: Dockerfile
    container_name: fgp_core_service
    environment:
      - DEBUG=0
      - SECRET_KEY=fgp_secret_key_2025_very_secure
      - DATABASE_URL=postgresql://fgp_user:fgp_password_2025@postgres:5432/fgp_db
      - REDIS_URL=redis://:fgp_redis_2025@redis:6379/0
      - ALLOWED_HOSTS=localhost,127.0.0.1,fgp_core_service,fgp-core,fgp_core,fgp_core:8000
      - GUICHET_INTERNAL_API_KEY=fgp_guichet_internal_dev
      - CORS_ALLOWED_ORIGINS=http://localhost:3000,http://127.0.0.1:3000
    ports:
      - "8000:8000"
    volumes:
      - ./backend/fgp_core:/app
      - fgp_media:/app/media
      - fgp_static:/app/static
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      fgp_network:
        aliases:
          - fgp-core
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health/health/', timeout=5)\""]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 40s
    command: >
      sh -c "mkdir -p /app/logs &&
             python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8000"

  # =====================================================
  # BACKEND DJANGO - ENROLLMENT GATEWAY
  # =====================================================
  enrollment_gateway:
    build:
      context: ./backend/enrollment_gateway
      dockerfile: Dockerfile
    container_name: fgp_enrollment_gateway
    environment:
      - DEBUG=0
      - SECRET_KEY=fgp_enrollment_secret_2025
      - DATABASE_URL=postgresql://fgp_user:fgp_password_2025@postgres:5432/fgp_db
      - REDIS_URL=redis://:fgp_redis_2025@redis:6379/1
      - FGP_CORE_URL=http://fgp-core:8000
      - ALLOWED_HOSTS=localhost,127.0.0.1,host.docker.internal,fgp_enrollment_gateway,enrollment_gateway,enrollment-gateway
      - GUICHET_INTERNAL_API_KEY=fgp_guichet_internal_dev
      - CORS_ALLOWED_ORIGINS=http://localhost:3000,http://127.0.0.1:3000,http://192.168.10.104:3000
    ports:
      - "8001:8000"
    volumes:
      - ./backend/enrollment_gateway:/app
      - fgp_media:/app/media
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      fgp_core:
        condition: service_healthy
    networks:
      - fgp_network
    restart: unless-stopped
    command: >
      sh -c "mkdir -p /app/logs &&
             python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8000"

  # =====================================================
  # WORKER CELERY - ENROLLMENT GATEWAY (traitement async submit)
  # =====================================================
  enrollment_worker:
    build:
      context: ./backend/enrollment_gateway
      dockerfile: Dockerfile
    container_name: fgp_enrollment_worker
    environment:
      - DEBUG=0
      - SECRET_KEY=fgp_enrollment_secret_2025
      - DATABASE_URL=postgresql://fgp_user:fgp_password_2025@postgres:5432/fgp_db
      - REDIS_URL=redis://:fgp_redis_2025@redis:6379/1
      - FGP_CORE_URL=http://fgp-core:8000
      - EXTENSIONS_SERVICE_URL=http://extensions-service:8000
      - ABIS_SERVICE_URL=http://abis_service:8000
      - ALLOWED_HOSTS=localhost,127.0.0.1,fgp_enrollment_gateway
      - GUICHET_INTERNAL_API_KEY=fgp_guichet_internal_dev
    volumes:
      - ./backend/enrollment_gateway:/app
      - fgp_media:/app/media
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      fgp_core:
        condition: service_healthy
      extensions_service:
        condition: service_started
    networks:
      - fgp_network
    restart: unless-stopped
    command: celery -A enrollment_gateway worker -l info

  # =====================================================
  # BACKEND DJANGO - EXTENSIONS SERVICE
  # =====================================================
  extensions_service:
    build:
      context: ./backend/extensions_service
      dockerfile: Dockerfile
    container_name: fgp_extensions_service
    environment:
      - DEBUG=0
      - SECRET_KEY=fgp_extensions_secret_2025
      - DATABASE_URL=postgresql://fgp_user:fgp_password_2025@postgres:5432/fgp_db
      - REDIS_URL=redis://:fgp_redis_2025@redis:6379/2
      - FGP_CORE_URL=http://fgp-core:8000
      - ALLOWED_HOSTS=localhost,127.0.0.1,fgp_extensions_service
      - GUICHET_INTERNAL_API_KEY=fgp_guichet_internal_dev
      - CORS_ALLOWED_ORIGINS=http://localhost:3000,http://127.0.0.1:3000
    ports:
      - "8002:8000"
    volumes:
      - ./backend/extensions_service:/app
      - fgp_media:/app/media
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      fgp_core:
        condition: service_started
    networks:
      fgp_network:
        aliases:
          - extensions-service
    restart: unless-stopped
    command: >
      sh -c "mkdir -p /app/logs &&
             python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8000"

  # =====================================================
  # BACKEND DJANGO - FINGERPRINT SERVICE (FAP60 via Device Bridge)
  # =====================================================
  fingerprint_service:
    build:
      context: ./backend/fingerprint_service
      dockerfile: Dockerfile
    container_name: fgp_fingerprint_service
    environment:
      - DEBUG=1
      - DJANGO_SECRET_KEY=fgp_fingerprint_secret_2025
      - ALLOWED_HOSTS=localhost,127.0.0.1,fingerprint_service
      - CORS_ALLOWED_ORIGINS=http://localhost:3000,http://127.0.0.1:3000
      - DEVICE_BRIDGE_URL=http://host.docker.internal:8765
      - DEVICE_BRIDGE_TIMEOUT=60
    ports:
      - "8010:8010"
    volumes:
      - ./backend/fingerprint_service:/app
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - fgp_network
    restart: unless-stopped

  # =====================================================
  # BACKEND DJANGO - BIOMETRIC SERVICE (IRIS) — profil dev Linux
  # =====================================================
  biometric_service:
    profiles:
      - dev-biometric
    build:
      context: ./backend/biometric_service
      dockerfile: Dockerfile
    container_name: fgp_biometric_service
    environment:
      - DEBUG=1
      - DJANGO_SECRET_KEY=fgp_biometric_secret_2025
      - POSTGRES_DB=fgp_db
      - POSTGRES_USER=fgp_user
      - POSTGRES_PASSWORD=fgp_password_2025
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - ALLOWED_HOSTS=localhost,127.0.0.1,biometric_service
      - IRIS_CAMERA_INDEX=2
      - IRIS_SAVE_IMAGES=True
    ports:
      - "8003:8003"
    volumes:
      - ./backend/biometric_service:/app
      - fgp_biometric_data:/app/media
    devices:
      - /dev/video0:/dev/video0
      - /dev/video1:/dev/video1
      - /dev/video2:/dev/video2
      - /dev/video3:/dev/video3
    privileged: true
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - fgp_network
    restart: unless-stopped

  # =====================================================
  # PGADMIN (Interface de gestion PostgreSQL)
  # =====================================================
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: fgp_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@fgp.local
      PGADMIN_DEFAULT_PASSWORD: admin123
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      - postgres
    networks:
      - fgp_network
    restart: unless-stopped

  # =====================================================
  # FRONTEND NEXT.JS
  # =====================================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: fgp_frontend
    environment:
      - NODE_ENV=development
      - NEXT_PUBLIC_API_URL=http://localhost:8001
      - ENROLLMENT_GATEWAY_INTERNAL_URL=http://host.docker.internal:8001
      - NEXT_PUBLIC_FGP_CORE_URL=http://localhost:8000
      - NEXT_PUBLIC_EXTENSIONS_URL=http://localhost:8002
      - NEXT_PUBLIC_BIOMETRIC_URL=http://localhost:8003
      - NEXT_PUBLIC_FINGERPRINT_URL=http://localhost:8010
      - NEXT_PUBLIC_DEVICE_BRIDGE_URL=http://127.0.0.1:8765
      - NEXT_PUBLIC_USE_DEVICE_BRIDGE_DIRECT=true
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - enrollment_gateway
      - fgp_core
      - extensions_service
      - fingerprint_service
    networks:
      - fgp_network
    restart: unless-stopped
    command: npm run dev

  # =====================================================
  # NGINX (Reverse Proxy)
  # =====================================================
  nginx:
    image: nginx:alpine
    container_name: fgp_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./docker/nginx/conf.d:/etc/nginx/conf.d
      - fgp_media:/var/www/media
      - fgp_static:/var/www/static
    depends_on:
      - frontend
      - enrollment_gateway
      - fgp_core
      - extensions_service
      - fingerprint_service
    networks:
      - fgp_network
    restart: unless-stopped

  # =====================================================
  # MONITORING - PROMETHEUS
  # =====================================================
  prometheus:
    image: prom/prometheus:latest
    container_name: fgp_prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=200h'
      - '--web.enable-lifecycle'
    networks:
      - fgp_network
    restart: unless-stopped

  # =====================================================
  # MONITORING - GRAFANA
  # =====================================================
  grafana:
    image: grafana/grafana:latest
    container_name: fgp_grafana
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin123
    volumes:
      - grafana_data:/var/lib/grafana
      - ./docker/grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      - prometheus
    networks:
      - fgp_network
    restart: unless-stopped

# =====================================================
# VOLUMES
# =====================================================
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  fgp_media:
    driver: local
  fgp_static:
    driver: local
  fgp_biometric_data:
    driver: local
  pgadmin_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local

# =====================================================
# RÉSEAUX
# =====================================================
networks:
  fgp_network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
